<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jettra Designer</title>
    <style>
        :root { --jettra-accent: #00ffff; --jettra-bg: #0d1117; --jettra-border: #30363d; --jettra-text: #e6edf3; --jettra-accent-dim: rgba(0, 255, 255, 0.1); }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--jettra-bg); color: var(--jettra-text); margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; font-size: 13px; }
        .sidebar { width: 300px; background: #010409; border-right: 1px solid var(--jettra-border); display: flex; flex-direction: column; overflow-y: auto; }
        .topbar { display: flex; align-items: center; gap: 10px; padding: 12px; background: #161b22; border-bottom: 1px solid var(--jettra-border); }
        .main-area { flex: 1; display: flex; flex-direction: column; }
        .canvas-area { flex: 1; padding: 30px; position: relative; display: flex; flex-direction: column; overflow-y: auto; background: #0d1117; }
        .canvas-viewport { display: none; height: 100%; overflow: auto; background: #010409; }
        .canvas-viewport.active { display: block; }
        
        .canvas-drop-area { 
            flex: 1; 
            border: 2px dashed var(--jettra-border); 
            border-radius: 8px; 
            position: relative; 
            padding: 20px; 
            transition: all 0.3s; 
            min-height: 800px; 
            min-width: 1000px;
            transform-origin: top left;
            background: #0d1117;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        .canvas-item { 
            position: relative; 
            padding: 10px; 
            margin-bottom: 10px; 
            background: rgba(255,255,255,0.02); 
            border: 1px solid transparent; 
            border-radius: 6px; 
            transition: all 0.2s;
        }
        .canvas-item:hover { border-color: rgba(0,255,255,0.3); background: rgba(255,255,255,0.05); }
        .canvas-item.selected { border-color: var(--jettra-accent); background: rgba(0,255,255,0.05); box-shadow: 0 0 10px rgba(0,255,255,0.1); }
        
        .canvas-container { min-height: 40px; padding: 10px; border: 1px dashed rgba(255,255,255,0.1); border-radius: 6px; margin-top: 5px; }
        
        .delete-tool { 
            position: absolute; 
            top: -8px; 
            right: -8px; 
            background: #f85149; 
            color: white; 
            width: 18px; 
            height: 18px; 
            border-radius: 50%; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .canvas-item:hover .delete-tool { display: flex; }

        .j-component { display: inline-block; width: 100%; box-sizing: border-box; }
        
        .j-btn { 
            cursor: pointer; 
            border-radius: 6px; 
            padding: 8px 16px; 
            border: 1px solid var(--jettra-border); 
            background: #21262d; 
            color: var(--jettra-text); 
            font-weight: 600; 
            font-size: 13px; 
            transition: all 0.2s; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
        }
        .j-btn:hover { background: #30363d; border-color: #8b949e; }
        .j-btn-primary { background: #238636; border-color: rgba(240,246,252,0.1); color: white; }
        .j-btn-primary:hover { background: #2ea043; }
        .j-btn-danger { background: #da3633; border-color: rgba(240,246,252,0.1); color: white; }
        .j-btn-danger:hover { background: #f85149; }

        .j-input { 
            background: #0d1117; 
            border: 1px solid var(--jettra-border); 
            color: var(--jettra-text); 
            padding: 8px 12px; 
            border-radius: 6px; 
            font-size: 13px; 
            width: 100%; 
            box-sizing: border-box; 
            outline: none; 
        }
        .j-input:focus { border-color: var(--jettra-accent); box-shadow: 0 0 0 2px var(--jettra-accent-dim); }

        .sidebar-tabs { display: flex; border-bottom: 1px solid var(--jettra-border); background: #161b22; }
        .sidebar-tab { padding: 10px 15px; cursor: pointer; font-size: 12px; color: #8b949e; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .sidebar-tab:hover { color: var(--jettra-text); background: rgba(255,255,255,0.02); }
        .sidebar-tab.active { color: var(--jettra-accent); border-bottom-color: var(--jettra-accent); background: rgba(0,255,255,0.05); font-weight: 600; }

        .explorer-item { padding: 6px 12px; cursor: pointer; font-size: 12px; display: flex; align-items: center; border-radius: 4px; margin: 1px 4px; transition: all 0.1s; color: #c9d1d9; }
        .explorer-item:hover { background: rgba(255,255,255,0.05); }
        .file-page { color: #79c0ff; }
        .file-model { color: #aff5b4; }

        .inspector-row { margin-bottom: 12px; padding: 0 4px; }
        .inspector-label { display: block; font-size: 11px; color: #8b949e; margin-bottom: 6px; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
        .inspector-input { width: 100%; }

        .property-inspector { 
            width: 320px; 
            background: #161b22; 
            border-left: 1px solid var(--jettra-border); 
            display: none; 
            flex-direction: column; 
            padding: 16px; 
            overflow-y: auto; 
            box-shadow: -5px 0 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-tabs">
            <div id="tab-btn-project" class="sidebar-tab active" onclick="showSidebarTab('project')">Project</div>
            <div id="tab-btn-palette" class="sidebar-tab" onclick="showSidebarTab('palette')">Palette</div>
        </div>

        <div id="tab-project" class="tab-content active">
            <div class="project-info-section">
                <div style="font-size: 10px; color: #8b949e; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">Active Project</div>
                <div id="project-name-display" style="color: var(--jettra-accent); font-weight: bold; font-size: 15px; margin-bottom: 8px;">None Selected</div>
                <div id="project-path-display" style="font-size: 11px; color: #8b949e; word-break: break-all; line-height: 1.5;">Select a project to begin</div>
                <button class="j-btn" style="width: 100%; margin-top: 12px; font-size: 12px; padding: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; background: #21262d; border: 1px solid var(--jettra-border);" onclick="requestWorkspaceFiles()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
                    Refresh Files
                </button>
            </div>
            
            <div id="project-explorer" style="padding: 10px; display: none;">
                <div style="font-size: 10px; color: var(--jettra-accent); margin-bottom: 8px; font-weight: bold; text-transform: uppercase;">Explorer</div>
                <div id="file-tree"></div>
            </div>
        </div>

        <div id="tab-palette" class="tab-content">
            <div id="palette-container" style="padding: 10px;"></div>
        </div>
    </div>
    
    <div class="main-area">
        <div class="topbar">
            <span style="font-size: 14px; font-weight: bold; color: var(--jettra-accent); letter-spacing: 0.5px;">Jettra NB Designer</span>
            <div style="margin-left: auto; display: flex; align-items: center; gap: 10px;">
                <!-- Zoom Controls -->
                <div style="display: flex; align-items: center; gap: 5px; padding: 0 10px; border-left: 1px solid var(--jettra-border); background: rgba(0,0,0,0.2); border-radius: 6px; height: 28px;">
                    <button class="j-btn" style="padding: 0 8px; height: 20px; line-height: 1; font-size: 14px; background: #333;" onclick="adjustZoom(-0.1)">-</button>
                    <select id="zoom-select" class="j-input" style="width: 65px; margin: 0; padding: 2px; font-size: 10px; height: 20px; border: none; background: transparent;" onchange="setZoom(this.value)">
                        <option value="0.25">25%</option>
                        <option value="0.5">50%</option>
                        <option value="0.75">75%</option>
                        <option value="1" selected>100%</option>
                        <option value="1.25">125%</option>
                        <option value="1.5">150%</option>
                        <option value="2">200%</option>
                        <option value="3">300%</option>
                    </select>
                    <button class="j-btn" style="padding: 0 8px; height: 20px; line-height: 1; font-size: 14px; background: #333;" onclick="adjustZoom(0.1)">+</button>
                </div>

                <span style="font-size: 11px;">Model:</span>
                <select id="model-select" class="j-input" style="width: 150px; margin: 0; padding: 4px;" onchange="selectModel(this.value)">
                    <option value="">None</option>
                </select>
                <button class="j-btn j-btn-primary" style="padding: 4px 10px; display: flex; align-items: center; gap: 5px;" onclick="generateCRUD()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    CRUD
                </button>
                <button class="j-btn" style="padding: 4px 10px;" onclick="generateCode()">Generate Java</button>
                <button class="j-btn j-btn-danger" style="padding: 4px 10px;" onclick="clearCanvas()">Clear</button>
            </div>
        </div>
        
        <div class="canvas-area" style="display: flex; flex-direction: column;">
            <div id="designer-tabs" class="designer-tabs">
                <div id="tab-main" class="designer-tab active" onclick="switchDesignerTab('main')">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
                    Main Page
                </div>
            </div>
            <div id="viewports-container" style="flex: 1; position: relative; overflow: hidden; background: #010409;">
                <div id="viewport-main" class="canvas-viewport active">
                    <div style="padding: 100px; min-width: min-content; min-height: min-content;">
                        <div id="canvas" class="canvas-drop-area" ondrop="drop(event)" ondragover="allowDrop(event)">
                            <div class="canvas-placeholder" style="color:#8b949e; text-align:center; margin-top:200px; font-size: 1.5rem;">Drag components here</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="code-area">
            <div style="padding: 5px 10px; background: rgba(0,0,0,0.5); font-size: 11px; font-weight: bold; border-bottom: 1px solid var(--jettra-border); display: flex; justify-content: space-between; align-items: center;">
                <span>Java Source Code</span>
                <div style="display:flex; gap:5px;">
                    <button class="j-btn j-btn-primary" style="padding: 4px 12px; font-size: 11px; font-weight: bold; box-shadow: 0 0 10px rgba(0,255,255,0.2);" onclick="syncCodeToCanvas()">Sync to Canvas</button>
                    <button class="j-btn j-btn-primary" style="padding: 2px 8px; font-size: 10px; display: flex; align-items: center; gap: 4px;" onclick="saveGeneratedCode()">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                        Save to File
                    </button>
                </div>
            </div>
            <textarea id="code-display" class="code-display" placeholder="Java code will appear here or can be written manually...">// Generated code will appear here...</textarea>
        </div>
    </div>

    <div id="property-inspector" class="property-inspector">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span style="font-size: 14px; font-weight: bold; color: var(--jettra-accent); margin: 0;">Properties</span>
            <span style="color: #ff4444; font-size: 24px; cursor: pointer; line-height: 1; font-weight: bold;" onclick="document.getElementById('property-inspector').style.display='none'">&times;</span>
        </div>
        <div id="inspector-properties" style="flex: 1;"></div>
    </div>

    <script>
        let fileCache = {};
        let models = [];
        let currentModel = null;
        let modelFields = [];
        let currentClassName = "GeneratedPage";
        let activeDesignerTab = 'main';
        
        let currentZoom = 1.0;

        function setZoom(val) {
            currentZoom = parseFloat(val);
            applyZoom();
        }

        function adjustZoom(delta) {
            currentZoom = Math.max(0.2, Math.min(3.0, currentZoom + delta));
            // Update select to nearest value if possible
            const select = document.getElementById('zoom-select');
            const percent = Math.round(currentZoom * 100);
            // We'll just show the actual zoom in the select title or a label if we wanted to be fancy, 
            // but for now let's just apply it.
            applyZoom();
        }

        function applyZoom() {
            const canvases = document.querySelectorAll('.canvas-drop-area');
            canvases.forEach(c => {
                c.style.transform = `scale(${currentZoom})`;
            });
            // Update the display if needed
        }

        function tabTo(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelector(`[onclick="tabTo('${id}')"]`).classList.add('active');
        }

        // Helper to parse balanced arguments (handles nested commas and strings)
        function parseBalancedArgs(str) {
            const args = [];
            let current = '';
            let depth = 0;
            let inString = false;
            let quoteChar = '';

            for (let i = 0; i < str.length; i++) {
                const char = str[i];
                if (char === '"' || char === "'") {
                    if (!inString) {
                        inString = true;
                        quoteChar = char;
                    } else if (char === quoteChar) {
                        inString = false;
                    }
                }

                if (!inString) {
                    if (char === '(') depth++;
                    if (char === ')') depth--;
                    if (char === ',' && depth === 0) {
                        args.push(current.trim());
                        current = '';
                        continue;
                    }
                }
                current += char;
            }
            if (current) args.push(current.trim());
            return args;
        }

        function switchDesignerTab(id) {
            activeDesignerTab = id;
            document.querySelectorAll('.designer-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.canvas-viewport').forEach(v => v.classList.remove('active'));
            
            const tab = document.getElementById('tab-' + id);
            const viewport = document.getElementById('viewport-' + id);
            
            if (tab) tab.classList.add('active');
            if (viewport) viewport.classList.add('active');
        }

        function addModalTab(modalId, title) {
            if (designerTabs.find(t => t.id === modalId)) return;
            
            designerTabs.push({ id: modalId, title: title });
            
            const tabsContainer = document.getElementById('designer-tabs');
            const tab = document.createElement('div');
            tab.id = 'tab-' + modalId;
            tab.className = 'designer-tab';
            tab.onclick = () => switchDesignerTab(modalId);
            tab.innerHTML = `
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px;">${title}</span>
                <span class="designer-tab-close" onclick="closeDesignerTab(event, '${modalId}')">&times;</span>
            `;
            tabsContainer.appendChild(tab);
            
            const viewportsContainer = document.getElementById('viewports-container');
            const viewport = document.createElement('div');
            viewport.id = 'viewport-' + modalId;
            viewport.className = 'canvas-viewport';
            viewport.innerHTML = `
                <div id="canvas-${modalId}" class="canvas-drop-area" style="min-height: 100%; padding: 20px;" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <div class="canvas-placeholder" style="color:#8b949e; text-align:center; margin-top:100px;">Modal Content: Drag components here</div>
                </div>
            `;
            viewportsContainer.appendChild(viewport);
            
            switchDesignerTab(modalId);
        }

        function closeDesignerTab(e, id) {
            if (e) e.stopPropagation();
            if (id === 'main') return;
            
            const index = designerTabs.findIndex(t => t.id === id);
            if (index > -1) {
                designerTabs.splice(index, 1);
                const tab = document.getElementById('tab-' + id);
                const viewport = document.getElementById('viewport-' + id);
                if (tab) tab.remove();
                if (viewport) viewport.remove();
                if (activeDesignerTab === id) {
                    switchDesignerTab('main');
                }
            }
            updateCode();
        }

        function addDatatableColumn() {
            if (!selectedElement) return;
            const props = JSON.parse(selectedElement.getAttribute('data-props') || '{}');
            props.headers = props.headers || ['Col 1', 'Col 2'];
            props.headers.push('New Column');
            selectedElement.setAttribute('data-props', JSON.stringify(props));
            refreshComponentPreview(selectedElement);
            updateInspector();
            updateCode();
        }

        function removeDatatableColumn(index) {
            if (!selectedElement) return;
            const props = JSON.parse(selectedElement.getAttribute('data-props') || '{}');
            props.headers = props.headers || ['Col 1', 'Col 2'];
            props.headers.splice(index, 1);
            selectedElement.setAttribute('data-props', JSON.stringify(props));
            refreshComponentPreview(selectedElement);
            updateInspector();
            updateCode();
        }

        function updateDatatableColumn(index, value) {
            if (!selectedElement) return;
            const props = JSON.parse(selectedElement.getAttribute('data-props') || '{}');
            props.headers = props.headers || ['Col 1', 'Col 2'];
            props.headers[index] = value;
            selectedElement.setAttribute('data-props', JSON.stringify(props));
            refreshComponentPreview(selectedElement);
            updateCode();
        }

        function refreshComponentPreview(el) {
            const type = el.getAttribute('data-type');
            const p = JSON.parse(el.getAttribute('data-props') || '{}');
            
            let content = '';
            switch(type) {
                case 'Clock': content = '<div class="j-component live-clock" style="font-size: 20px; font-weight: bold; color: #0f0; background: #000; padding: 10px; border-radius: 8px; border: 2px solid #333; display:inline-block; font-family: monospace;">12:00:00 AM</div>'; break;
                case 'Header': 
                    const hLevel = p.level || '2';
                    const hText = p.text || 'Header';
                    content = `<h${hLevel} style="margin:0; color:var(--jettra-text);">${hText}</h${hLevel}>`; 
                    break;
                case 'Paragraph': content = `<p style="margin:0; color:var(--jettra-text);">${p.text || 'Sample text...'}</p>`; break;
                case 'Span': content = `<span style="color:var(--jettra-text);">${p.text || 'Span Text'}</span>`; break;
                case 'Label': content = `<label style="color:var(--jettra-text); font-weight:bold;">${p.text || 'Label Text'}</label>`; break;
                case 'Divide': content = '<div style="border-top:1px solid var(--jettra-border); margin:15px 0; width:100%"></div>'; break;
                case 'Separator': content = '<hr style="border: 0; border-top: 1px dashed var(--jettra-border); margin:15px 0; width:100%;">'; break;
                case 'Button': content = `<button class="j-btn j-btn-primary" type="button">${p.text || 'Button'}</button>`; break;
                case 'TextBox': content = '<input type="text" class="j-input" placeholder="TextBox..." onfocus="this.blur()">'; break;
                case 'TextArea': content = '<textarea class="j-input" placeholder="TextArea..." rows="3" onfocus="this.blur()"></textarea>'; break;
                case 'CheckBox': content = '<div style="display:flex; align-items:center; gap:8px;"><input type="checkbox" checked onfocus="this.blur()"/><label>CheckBox</label></div>'; break;
                case 'RadioButton': content = '<div style="display:flex; align-items:center; gap:8px;"><input type="radio" checked onfocus="this.blur()"/><label>RadioButton</label></div>'; break;
                case 'RadioGroupButton': content = '<div class="canvas-container" style="padding:10px; border:1px dashed var(--jettra-accent); min-height:60px;"><label style="font-weight:bold; color:var(--jettra-accent); display:block; margin-bottom:10px;">Radio Group</label></div>'; break;
                case 'CheckBoxGroup': content = '<div class="canvas-container" style="padding:10px; border:1px dashed var(--jettra-accent); min-height:60px;"><label style="font-weight:bold; color:var(--jettra-accent); display:block; margin-bottom:10px;">CheckBox Group</label></div>'; break;
                case 'ScheduleControl': content = '<input type="datetime-local" class="j-input" onfocus="this.blur()"/>'; break;
                case 'SelectOne': content = '<div class="select-wrapper"><label style="display:block; font-size:11px; margin-bottom:4px; color:var(--jettra-accent)">Select</label><select class="j-input" onfocus="this.blur()"><option>Option 1...</option></select></div><span style="display:none">SelectOne</span>'; break;
                case 'SelectMany': content = '<div class="select-wrapper"><label style="display:block; font-size:11px; margin-bottom:4px; color:var(--jettra-accent)">Select Multiple</label><select class="j-input" multiple="multiple" style="height:80px" onfocus="this.blur()"><option>Option 1...</option></select></div><span style="display:none">SelectMany</span>'; break;
                case 'SelectOneIcon': content = '<select class="j-input" onfocus="this.blur()"><option>Icon Option 1...</option></select><span style="display:none">SelectOneIcon</span>'; break;
                case 'Spinner': content = '<div class="j-spinner-wrapper" style="display:inline-flex; align-items:center; border:1px solid var(--jettra-border); border-radius:8px; background:rgba(0,0,0,0.3); overflow:hidden;"><button type="button" class="j-spinner-btn j-spinner-minus" style="width:40px;height:40px;background:rgba(255,255,255,0.05);border:none;color:var(--jettra-accent);font-size:1.2rem;font-weight:bold;">-</button><div class="j-spinner-display" style="min-width:60px;text-align:center;font-family:monospace;font-size:1.1rem;color:var(--jettra-text);">0</div><button type="button" class="j-spinner-btn j-spinner-plus" style="width:40px;height:40px;background:rgba(255,255,255,0.05);border:none;color:var(--jettra-accent);font-size:1.2rem;font-weight:bold;">+</button></div>'; break;
                case 'ToggleSwitch': content = '<div style="display:flex; align-items:center; gap:8px;"><div style="width:40px;height:20px;background:var(--jettra-accent);border-radius:10px;position:relative;"><div style="width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;right:2px;"></div></div><label>ToggleSwitch</label></div>'; break;
                case 'FileUpload': content = '<div style="border:1px dashed var(--jettra-accent); padding:20px; text-align:center; border-radius:8px; color:var(--jettra-text);"><div style="margin-bottom:10px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div><span>Click or drag files here to upload</span></div>'; break;

        // Drag and Drop Logic
        function allowDrop(ev) {
            ev.preventDefault();
            const target = ev.target.closest('.canvas-drop-area, .canvas-container');
            if (target) {
                target.classList.add('drag-over');
            }
        }

        function drop(ev) {
            ev.preventDefault();
            const target = ev.target.closest('.canvas-drop-area, .canvas-container');
            if (target) {
                target.classList.remove('drag-over');
            }
            
            const data = ev.dataTransfer.getData("text/plain");
            if (!data) return;

            if (data.startsWith('file:')) {
                loadFileContentToCanvas(data.substring(5));
                return;
            }
            if (data.startsWith('component:')) {
                addComponent(data.substring(10), target);
            }
        }

        function saveGeneratedCode() {
            const code = document.getElementById('code-display').value;
            if (!code || code.trim() === "" || code.startsWith('//')) {
                if (window.javaConnector) window.javaConnector.showError("No hay código para guardar.");
                return;
            }
            // Extract class name more robustly
            const match = code.match(/public\s+(?:abstract\s+)?class\s+(\w+)/);
            const className = match ? match[1] : null;
            
            if (!className) {
                if (window.javaConnector) window.javaConnector.showError("No se pudo identificar el nombre de la clase en el código.");
                return;
            }
            
            if (window.javaConnector) {
                window.javaConnector.saveCode(className, code);
            }
        }

            supportedEvents.forEach(ev => {

        function updateEvent(evName, code) {

        function createInspectorRow(label, key, value, type) {

        function updateProp(key, value) {

        // Code Generation
        function updateCode() {
            const canvas = document.getElementById('canvas');
            const items = canvas.querySelectorAll(':scope > .canvas-item');
            if (items.length === 0) {
                document.getElementById('code-display').value = "// No components added yet";
                return;
            }
            
            let code = "package com.jettra.example.pages;\n\n";
            code += "import io.jettra.wui.complex.*;\n";
            code += "import io.jettra.wui.components.*;\n\n";
            code += `public class ${currentClassName} extends DashboardBasePage {\n\n`;
            if (currentModel) {
                code += `    private ${currentModel.name} model = new ${currentModel.name}();\n\n`;
            }
            code += "    @Override\n";
            code += "    protected void initCenter(Center center, String username) {\n";
            
            function chainProps(props, type) {
                let c = "";
                if (props.binding) c += `\n            .bind("${props.binding}")`;
                if (props.btnStyle) c += `\n            .setStyle(Button.Style.${props.btnStyle})`;
                if (props.icon) c += `\n            .setIcon("${props.icon}")`;
                if (props.columns) c += `\n            .setColumns(${props.columns})`;
                
                // New Fluent API properties
                if (props.value) c += `\n            .setValue("${props.value}")`;
                if (props.readonly === 'true') c += `\n            .setReadonly(true)`;
                if (props.display) c += `\n            .setDisplay("${props.display}")`;
                
                if (type === 'Button') {
                    if (props.backgroundColor) c += `\n            .setBackgroundColor("${props.backgroundColor}")`;
                    if (props.onclick) c += `\n            .setOnclick("${props.onclick}")`;
                    if (props.type) c += `\n            .setType("${props.type}")`;
                }

                if (type === 'Modal' || type === 'Dialog') {
                    if (props.padding) c += `\n            .setPadding("${props.padding}")`;
                    if (props.backgroundColor) c += `\n            .setBackgroundColor("${props.backgroundColor}")`;
                    if (props.border) c += `\n            .setBorder("${props.border}")`;
                    if (props.width) c += `\n            .setWidth("${props.width}")`;
                    if (props.maxWidth) c += `\n            .setMaxWidth("${props.maxWidth}")`;
                    if (props.borderRadius) c += `\n            .setBorderRadius("${props.borderRadius}")`;
                }

                // Events
                if (props.events) {
                    Object.keys(props.events).forEach(ev => {
                        const code = props.events[ev];
                        if (code && code.trim() !== "") {
                            c += `\n            .${ev}(${code})`;
                        }
                    });
                }
                return c;
            }

            function walk(nodes, parentName) {
                let out = "";
                nodes.forEach((it, idx) => {
                    const type = it.getAttribute('data-type');
                    const props = JSON.parse(it.getAttribute('data-props') || '{}');
                    const vName = props.id || (type.toLowerCase() + '_' + idx);
                    
                    const simpleTypes = ['Divide', 'Separator', 'Header', 'Paragraph', 'Span', 'Label', 'Clock', 'Loading', 'Alert', 'Notification', 'TrafficLight'];
                    
                    if (['Panel', 'Div', 'FormGroup', 'Card', 'Grid', 'Board'].includes(type)) {
                        out += `        ${type} ${vName} = new ${type}()${chainProps(props, type)};\n`;
                        if (type === 'Card' && props.title) out += `        ${vName}.setTitle("${props.title}");\n`;
                        
                        const kids = it.querySelectorAll(':scope > .canvas-container > .canvas-item, :scope > div > .canvas-container > .canvas-item');
                        if (kids.length > 0) out += walk(kids, vName);
                        out += `        ${parentName}.add(${vName});\n`;
                    } else if (simpleTypes.includes(type)) {
                        let init = "";
                        if (type === 'Header') init = `new Header(${props.level || 2}, "${props.text}")`;
                        else if (type === 'Divide' || type === 'Separator') init = `new ${type}()`;
                        else init = `new ${type}("${props.text}")`;
                        
                        out += `        ${parentName}.add(${init}${chainProps(props, type)});\n`;
                    } else if (type === 'SelectOne' || type === 'SelectMany') {
                        out += `        ${parentName}.add(new ${type}("${vName}")${chainProps(props, type)}`;
                        if (props.options) {
                            props.options.split(',').forEach(o => {
                                const [v, l] = o.split(':');
                                out += `\n            .addOption("${v.trim()}", "${(l || v).trim()}")`;
                            });
                        }
                        out += `);\n`;
                    } else if (type === 'Datatable') {
                        const hRow = (props.headers || ["Col 1", "Col 2"]).map(h => `"${h}"`).join(", ");
                        out += `        ${parentName}.add(new Datatable().addHeaderRow(${hRow})${chainProps(props, type)});\n`;
                    } else {
                        out += `        ${parentName}.add(new ${type}("${props.text || vName}")${chainProps(props, type)});\n`;
                    }
                });
                return out;
            }
            
            code += walk(items, "center");

            // Walk Modal tabs
            designerTabs.forEach(tab => {
                if (tab.id === 'main') return;
                const mCanvas = document.getElementById('canvas-' + tab.id);
                if (!mCanvas) return;
                const mItems = mCanvas.querySelectorAll(':scope > .canvas-item');
                if (mItems.length > 0) {
                    const varName = tab.id.replace('modal_', 'm_');
                    code += `\n        // Modal Content: ${tab.title}\n`;
                    code += `        Modal ${varName} = new Modal("${tab.id}");\n`;
                    code += walk(mItems, varName);
                    code += `        center.add(${varName});\n`;
                }
            });

            code += "    }\n}\n";
            
            document.getElementById('code-display').value = code;
        }

        function generateCode() {
            const code = document.getElementById('code-display').value;
            if (window.javaConnector) {
                window.javaConnector.generateCode(code);
            }
        }

        // IPC with Java Connector
        function requestWorkspaceFiles() {
            if (window.javaConnector) {
                window.javaConnector.requestWorkspaceFiles();
            }
        }

        // Called from Java
        function loadWorkspaceFiles(filesJson) {
            let files = JSON.parse(filesJson);
            
            // Sort files alphabetically by filename
            files.sort((a, b) => {
                const nameA = a.path.split('/').pop().toUpperCase();
                const nameB = b.path.split('/').pop().toUpperCase();
                return nameA.localeCompare(nameB);
            });

            fileCache = {};
            models = [];
            const groups = { model: [], pages: [], properties: [] };
            
            files.forEach(f => {
                fileCache[f.path] = f.content;
                if (f.type === 'model') models.push({ name: f.path.split('/').pop().replace('.java', ''), path: f.path });
                if (groups[f.type]) groups[f.type].push(f);
            });
            
            const renderGroup = (title, items, cls) => {
                if (items.length === 0) return '';
                return `
                    <div class="tree-subtree" style="margin-bottom: 10px;">
                        <div style="font-size: 11px; color: #555; display: flex; align-items: center; gap: 5px; margin-bottom: 5px; cursor: pointer;" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                            ${title.toUpperCase()}
                        </div>
                        <div class="subtree-content">
                            ${items.map(f => {
                                const name = f.path.split('/').pop();
                                // Escape backslashes and single quotes for the JS call
                                const escapedPath = f.path.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                                return `
                                    <div class="explorer-item ${cls}" draggable="true" ondragstart="event.dataTransfer.setData('text/plain', 'file:${escapedPath}')" ondblclick="loadFileContentToCanvas('${escapedPath}')">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px; opacity:0.7;"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
                                        ${name}
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            };

            const treeHtml = [];
            treeHtml.push(renderGroup('model', groups.model, 'file-model'));
            treeHtml.push(renderGroup('pages', groups.pages, 'file-page'));
            treeHtml.push(renderGroup('resources', groups.properties, ''));
            
            document.getElementById('file-tree').innerHTML = treeHtml.join('');
            document.getElementById('project-explorer').style.display = 'block';
            
            // Update Model Select
            const select = document.getElementById('model-select');
            select.innerHTML = '<option value="">None</option>' + 
                models.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
            
            if (window.javaConnector) {
                window.javaConnector.showInfo(`Loaded ${files.length} files.`);
            }
        }

        function selectModel(name) {
            currentModel = models.find(m => m.name === name);
            if (currentModel) {
                const content = fileCache[currentModel.path];
                const fieldRegex = /(?:private|protected|public)?\s+([\w<>]+)\s+(\w+);/g;
                let match;
                modelFields = [];
                while ((match = fieldRegex.exec(content)) !== null) {
                    modelFields.push({ type: match[1], name: match[2] });
                }
                if (window.javaConnector) {
                    window.javaConnector.showInfo(`Selected model ${name} with ${modelFields.length} fields.`);
                }
            } else {
                modelFields = [];
            }
            updateCode();
        }

        function generateCRUD() {
            if (!currentModel) {
                if (window.javaConnector) window.javaConnector.showError('Select a Model first.');
                return;
            }
            
            const baseName = currentModel.name.replace('Model', '');
            let code = `package com.jettra.example.pages;\n\nimport io.jettra.wui.complex.*;\nimport io.jettra.wui.components.*;\n\n`;
            code += `public class ${baseName}Page extends DashboardBasePage {\n\n`;
            code += `    private ${currentModel.name} model = new ${currentModel.name}();\n\n`;
            code += `    @Override\n    protected void initCenter(Center center, String username) {\n`;
            code += `        center.add(new Header(2, "Mantenimiento de ${baseName}"));\n\n`;
            
            // Form
            code += `        Form form = new Form("${baseName.toLowerCase()}Form", "/${baseName.toLowerCase()}");\n`;
            modelFields.forEach(f => {
                code += `        FormGroup g_${f.name} = new FormGroup();\n`;
                code += `        g_${f.name}.add(new Label("${f.name}"));\n`;
                if (f.type.includes('List')) {
                    code += `        g_${f.name}.add(new SelectMany("${f.name}"));\n`;
                } else if (f.type === 'Date') {
                    code += `        g_${f.name}.add(new DatePicker("${f.name}", "${f.name}"));\n`;
                } else {
                    code += `        g_${f.name}.add(new TextBox("${f.name}", "${f.name}"));\n`;
                }
                code += `        form.add(g_${f.name});\n`;
            });
            code += `        form.add(new Button("Guardar").addClass("j-btn").addClass("j-btn-primary"));\n`;
            code += `        center.add(form);\n\n`;
            
            // Datatable
            code += `        Datatable table = new Datatable().addHeaderRow(\n            `;
            code += modelFields.map(f => `"${f.name}"`).join(', ') + `\n        );\n`;
            code += `        center.add(table);\n`;
            
            code += `    }\n}\n`;
            
            document.getElementById('code-display').value = code;
            syncCodeToCanvas();
            if (window.javaConnector) window.javaConnector.showInfo(`CRUD Generated for ${baseName}`);
        }

        function loadFileContentToCanvas(path) {
            console.log("Loading path:", path);
            let content = fileCache[path];
            
            if (!content) {
                // Fallback: try finding by filename
                const filename = path.split(/[/\\]/).pop();
                for (let key in fileCache) {
                    if (key.endsWith(filename)) {
                        content = fileCache[key];
                        break;
                    }
                }
            }

            if (content) {
                // Extract class name
                const classMatch = content.match(/public\s+(?:abstract\s+)?class\s+(\w+)/);
                if (classMatch) {
                    currentClassName = classMatch[1];
                }
                
                document.getElementById('code-display').value = content;
                syncCodeToCanvas();
                if (window.javaConnector) window.javaConnector.showInfo("Abierto: " + currentClassName);
            } else {
                if (window.javaConnector) window.javaConnector.showError("Error: No se encontró el contenido del archivo.");
            }
        }

        function syncCodeToCanvas() {
            const code = document.getElementById('code-display').value;
            const mainCanvas = document.getElementById('canvas');
            
            try {
                isSyncing = true;
                
                // Rebuild Tabs
                const tabsContainer = document.getElementById('designer-tabs');
                const viewportsContainer = document.getElementById('viewports-container');
                
                // Remove modal tabs/viewports
                document.querySelectorAll('.designer-tab:not(#tab-main)').forEach(t => t.remove());
                document.querySelectorAll('.canvas-viewport:not(#viewport-main)').forEach(v => v.remove());
                designerTabs = [{ id: 'main', title: 'Main Page' }];
                activeDesignerTab = 'main';
                switchDesignerTab('main');

                mainCanvas.innerHTML = '';
                
                if (!code || code.trim() === "" || code.startsWith('//')) {
                    mainCanvas.innerHTML = '<div class="canvas-placeholder" style="color:#8b949e; text-align:center; margin-top:100px;">Drag components here</div>';
                    return;
                }

                let varProps = { 'center': { id: 'canvas', text: 'Center' } };
                let varTypes = { 'center': 'Center' };
                let varToElementId = { 'center': 'canvas' }; 
                let modalVars = {};
                
                const rawLines = code.split('\n');
                let lines = [];
                rawLines.forEach(line => {
                    const trimmed = line.trim();
                    if (trimmed.startsWith('.') && lines.length > 0) {
                        lines[lines.length - 1] += ' ' + trimmed;
                    } else {
                        lines.push(line);
                    }
                });

                let found = false;
                let orphansContainer = document.createElement('div');
                orphansContainer.style.display = 'none';
                orphansContainer.id = 'orphans-container';
                document.body.appendChild(orphansContainer);

                console.log(`Syncing ${lines.length} lines of code (after joining chains)...`);

                let lastVar = null;

                lines.forEach((line, index) => {
                    try {
                        const trimmedLine = line.trim();
                    if (!trimmedLine || trimmedLine.startsWith('//') || trimmedLine.startsWith('import ') || trimmedLine.startsWith('package ')) return;

                    // 1. Detect Modal/Dialog instantiation (handle packages)
                    let modalMatch = trimmedLine.match(/(?:[a-zA-Z0-9_.]+\.)?(Modal|Dialog)\s+(\w+)\s*=\s*(?:new\s+(?:[a-zA-Z0-9_.]+\.)?(?:Modal|Dialog)|(?:\(\s*(?:[a-zA-Z0-9_.]+\.)?(?:Modal|Dialog)\s*\))?[\w.]+\.findComponent)\s*\("([^"]+)"\)/);
                    if (!modalMatch) {
                        modalMatch = trimmedLine.match(/(\w+)\s*=\s*new\s+(?:[a-zA-Z0-9_.]+\.)?(Modal|Dialog)\s*\("([^"]+)"\)/);
                    }

                    if (modalMatch) {
                        const isNewMatch = modalMatch.length === 4 && isNaN(modalMatch[1]);
                        const type = isNewMatch ? modalMatch[1] : modalMatch[2];
                        const varName = isNewMatch ? modalMatch[2] : modalMatch[1];
                        const modalId = modalMatch[3];
                        
                        console.log(`Found Modal/Dialog: ${varName} -> ${modalId}`);
                        modalVars[varName] = 'canvas-' + modalId;
                        varTypes[varName] = type;
                        varToElementId[varName] = modalId;
                        lastVar = varName;
                        
                        addComponent(type, mainCanvas, modalId);
                        found = true;
                    }

                    // 2. Detect variable declarations: Type var = new Type(...)
                    let declMatch = trimmedLine.match(/(?:[a-zA-Z0-9_.]+\.)?([A-Z]\w+)\s+(\w+)\s*=\s*new\s+(?:[a-zA-Z0-9_.]+\.)?\1\s*\(([^)]*)\)/);
                    if (!declMatch) {
                         declMatch = trimmedLine.match(/(?:[a-zA-Z0-9_.]+\.)?([A-Z]\w+)\s+(\w+)\s*=\s*new\s+(?:[a-zA-Z0-9_.]+\.)?\1(?:\s*\(([^)]*)\))?\s*\{?/);
                    }
                    
                    if (declMatch) {
                        const type = declMatch[1];
                        const varName = declMatch[2];
                        const args = declMatch[3] || "";
                        varTypes[varName] = type;
                        
                        console.log(`Tracked variable: ${varName} as ${type}`);
                        
                        let props = { id: (varName || type.toLowerCase() + '_' + index), text: type };
                        if (args) {
                             let argParts = args.split(',').map(a => a.trim());
                             if (type === 'Header') {
                                 props.level = argParts[0] || '2';
                                 props.text = (argParts[1] || 'Header').replace(/"/g, '');
                             } else {
                                 props.text = argParts[0].replace(/"/g, '');
                             }
                        }
                        varProps[varName] = props;
                        lastVar = varName;
                        
                        // Create as orphan immediately if it's a container to allow adding kids before it's on canvas
                        const containerTypes = ['Div', 'Panel', 'Card', 'Grid', 'Board', 'FormGroup', 'Center', 'UIComponent', 'Modal', 'Dialog'];
                        if (containerTypes.includes(type)) {
                             addComponent(type, orphansContainer, props.id, props);
                             varToElementId[varName] = props.id;
                        }
                    }

                    // 3. Detect property settings: var.setStyle(...), var.setProperty(...)
                    let vNameForStyle = null;
                    if (trimmedLine.startsWith('.')) {
                        vNameForStyle = lastVar;
                    } else if (trimmedLine.includes('.setStyle') || trimmedLine.includes('.setProperty')) {
                        vNameForStyle = trimmedLine.split('.')[0].trim();
                        // Extract actual variable name if it's a declaration (e.g. "Div container = container")
                        if (vNameForStyle.includes(' ')) {
                             const parts = vNameForStyle.split(/\s+/);
                             vNameForStyle = parts[parts.length - 1];
                        }
                    }

                    if (vNameForStyle) {
                        if (vNameForStyle.startsWith('io.jettra.wui.complex.')) vNameForStyle = vNameForStyle.substring(22);
                        if (vNameForStyle.startsWith('io.jettra.wui.components.')) vNameForStyle = vNameForStyle.substring(25);
                        if (vNameForStyle.startsWith('this.')) vNameForStyle = vNameForStyle.substring(5);
                        
                        // Extract all setStyle calls
                        const styleRegex = /\.setStyle\s*\(\s*"([^"]+)"\s*,\s*"([^"]+)"\s*\)/g;
                        let sMatch;
                        while ((sMatch = styleRegex.exec(trimmedLine)) !== null) {
                            let elId = varToElementId[vNameForStyle];
                            if (elId) {
                                let el = document.getElementById(elId);
                                if (el) {
                                    let target = el.querySelector('.j-component, .j-btn, h1, h2, h3, h4, h5, h6, p, span, label, .canvas-container');
                                    if (target) target.style[sMatch[1]] = sMatch[2];
                                }
                            }
                        }
                        
                        // Extract all setProperty calls
                        const propRegex = /\.setProperty\s*\(\s*"([^"]+)"\s*,\s*"([^"]+)"\s*\)/g;
                        let pMatch;
                        while ((pMatch = propRegex.exec(trimmedLine)) !== null) {
                            let elId = varToElementId[vNameForStyle];
                            if (elId) {
                                let el = document.getElementById(elId);
                                if (el) {
                                    if (pMatch[1] === 'onclick') {
                                        let target = el.querySelector('.j-btn, .j-component, a, button');
                                        if (target) {
                                            target.title = "Action: " + pMatch[2];
                                            target.style.border = "1px dashed var(--jettra-accent)";
                                        }
                                    } else if (pMatch[1] === 'text' || pMatch[1] === 'value') {
                                        let target = el.querySelector('h1, h2, h3, h4, h5, h6, p, span, label, button, .j-btn, .canvas-container');
                                        if (target) target.innerText = pMatch[2];
                                    }
                                }
                            }
                        }
                        
                        // Extract .setText calls
                        const textRegex = /\.setText\s*\(\s*"([^"]+)"\s*\)/g;
                        let tMatch;
                        while ((tMatch = textRegex.exec(trimmedLine)) !== null) {
                            let elId = varToElementId[vNameForStyle];
                            if (elId) {
                                let el = document.getElementById(elId);
                                if (el) {
                                    let target = el.querySelector('h1, h2, h3, h4, h5, h6, p, span, label, button, .j-btn, .canvas-container');
                                    if (target) target.innerText = tMatch[1];
                                }
                            }
                        }
                        lastVar = vNameForStyle;
                    }
                    
                    // 4. Detect components added
                    // Support: parent.add(new Comp(...)) or parent.add(var)
                    let addMatch = trimmedLine.match(/([\w.]+)\.add\s*\(\s*(?:new\s+(?:[a-zA-Z0-9_.]+\.)?([A-Z][a-zA-Z0-9_]*)\s*\(([^)]*)\)\s*\{?|(\w+))/);
                    if (addMatch) {
                        let parentVar = addMatch[1];
                        if (parentVar.startsWith('this.')) parentVar = parentVar.substring(5);
                        
                        let compType = addMatch[2];
                        let args = addMatch[3];
                        const childVarName = addMatch[4];
                        
                        if (!compType && childVarName) {
                            compType = varTypes[childVarName];
                        }
                        
                        if (compType && !['String', 'Integer', 'Boolean', 'ArrayList', 'List', 'Date'].includes(compType)) {
                            console.log(`Adding/Moving component ${compType} to ${parentVar} (var: ${childVarName})`);
                            found = true;
                            let targetCanvas = mainCanvas;
                            
                            if (modalVars[parentVar]) {
                                let target = document.getElementById(modalVars[parentVar]);
                                if (target) targetCanvas = target;
                            } else if (parentVar === 'center') {
                                targetCanvas = mainCanvas;
                            } else if (varToElementId[parentVar]) {
                                let parentEl = document.getElementById(varToElementId[parentVar]);
                                if (parentEl) {
                                    targetCanvas = parentEl.querySelector('.canvas-container') || parentEl;
                                }
                            }
                            
                            // If the parent itself is inside a modal tab, children should follow
                            let tempParent = targetCanvas;
                            while (tempParent && tempParent !== mainCanvas && tempParent !== document.body) {
                                if (tempParent.classList.contains('canvas-drop-area') && tempParent.id.startsWith('canvas-')) {
                                    // Already in a modal canvas
                                    break;
                                }
                                tempParent = tempParent.parentElement;
                            }
                            
                            if (childVarName && varToElementId[childVarName]) {
                                // Move existing orphan element to new parent
                                let childEl = document.getElementById(varToElementId[childVarName]);
                                if (childEl) {
                                    targetCanvas.appendChild(childEl);
                                    const placeholder = targetCanvas.querySelector('.canvas-placeholder');
                                    if (placeholder) placeholder.style.display = 'none';
                                }
                            } else {
                                // Create new element
                                let props = varProps[childVarName] || { id: (childVarName || compType.toLowerCase() + '_' + index), text: compType };
                                if (args) {
                                    let argParts = args.split(',').map(a => a.trim());
                                    if (compType === 'Header') {
                                        props.level = argParts[0] || '2';
                                        props.text = (argParts[1] || 'Header').replace(/"/g, '');
                                    } else if (compType === 'Datatable') {
                                        // Skip table header args for now
                                    } else {
                                        props.text = argParts[0].replace(/"/g, '');
                                    }
                                }
                                addComponent(compType, targetCanvas, props.id, props);
                                if (childVarName) varToElementId[childVarName] = props.id;
                            }
                            lastVar = parentVar;
                        }
                    }

                    // 5. Detect addHeaderRow for Datatable
                    const hRowIdx = trimmedLine.indexOf('.addHeaderRow(');
                    if (hRowIdx !== -1) {
                         let vName = null;
                         const vDeclMatch = trimmedLine.substring(0, hRowIdx).match(/(\w+)\s*=\s*new\s+/);
                         if (vDeclMatch) {
                             vName = vDeclMatch[1];
                         } else {
                             const vSimpleMatch = trimmedLine.substring(0, hRowIdx).match(/(\w+)\s*$/);
                             if (vSimpleMatch) vName = vSimpleMatch[1];
                         }
                         if (!vName || !varToElementId[vName]) vName = lastVar;

                         const elId = varToElementId[vName];
                         if (elId) {
                             const el = document.getElementById(elId);
                             if (el) {
                                 const table = el.querySelector('table');
                                 if (table) {
                                     // Extract balanced args
                                     const argsStart = hRowIdx + 14;
                                     let depth = 1;
                                     let i = argsStart;
                                     while (i < trimmedLine.length && depth > 0) {
                                         if (trimmedLine[i] === '(') depth++;
                                         if (trimmedLine[i] === ')') depth--;
                                         i++;
                                     }
                                     const argsRaw = trimmedLine.substring(argsStart, i - 1);
                                     const args = parseBalancedArgs(argsRaw).map(a => {
                                         const mProp = a.match(/msg\.getProperty\s*\(\s*(?:"[^"]+"|'[^']+')\s*,\s*(?:"([^"]+)"|'([^']+)')\s*\)/);
                                         if (mProp) return mProp[1] || mProp[2];
                                         return a.replace(/["']/g, '').trim();
                                     });
                                     
                                     const props = JSON.parse(el.getAttribute('data-props') || '{}');
                                     props.headers = args;
                                     el.setAttribute('data-props', JSON.stringify(props));
                                     const header = table.querySelector('tr');
                                     if (header) {
                                         header.innerHTML = args.map(a => `<th style="padding:8px;text-align:left;">${a}</th>`).join('');
                                     }
                                 }
                             }
                         }
                    }
                    } catch (lineErr) {
                        console.warn(`Error parsing line ${index + 1}: ${lineErr.message}`);
                    }
                });
                
                // Cleanup orphans and remove from DOM
                if (orphansContainer.parentNode) {
                    orphansContainer.parentNode.removeChild(orphansContainer);
                }
                
                if (!found) {
                    mainCanvas.innerHTML = '<div class="canvas-placeholder" style="color:#8b949e; text-align:center; margin-top:100px;">No se detectaron componentes en el código Java o estructura no soportada.</div>';
                }
                
                // Only switch to main if we're not already on a valid tab that was just recreated
                if (activeDesignerTab === 'main' || !document.getElementById('tab-' + activeDesignerTab)) {
                    switchDesignerTab('main');
                } else {
                    switchDesignerTab(activeDesignerTab);
                }
            } catch (err) {
                console.error("Sync Error:", err);
                if (window.javaConnector) window.javaConnector.showError("Error al sincronizar: " + err.message);
            } finally {
                isSyncing = false;
            }
        }
    </script>
</body>
